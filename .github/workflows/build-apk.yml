name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Build Next.js static export
        run: npm run web:build
        env:
          CI: false
          NODE_OPTIONS: '--max-old-space-size=4096'
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'https://api.arki3d.com' }}

      - name: Capacitor copy & sync
        run: |
          npx cap copy android
          npx cap sync android

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Build release APK (서명 없이)
        run: ./gradlew assembleRelease
        working-directory: android
        continue-on-error: true # 서명 키 없으면 실패해도 debug APK는 유효

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: arki-3d-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: arki-3d-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release with APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          name: 'Arki-3D ${{ github.ref_name }}'
          body: |
            ## Arki-3D ${{ github.ref_name }} Android APK

            ### 설치 방법
            1. `app-debug.apk` 다운로드
            2. Android 설정 → 보안 → 출처를 알 수 없는 앱 허용
            3. 다운받은 APK 파일 실행하여 설치

            ### 주요 기능
            - 2D 도면 편집 (벽, 문, 창문)
            - 3D 실시간 뷰어
            - AI 디자인 어시스턴트 (Claude API)
            - 자동 견적 산출
            - PDF 견적서 생성
            - 가구 라이브러리 (50종)

            ### 플러그인 시스템
            앱 내 플러그인 관리자에서 추가 기능 설치 가능

            > ⚠️ 이 빌드는 디버그 APK입니다. 개인 사용 목적으로만 사용하세요.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
